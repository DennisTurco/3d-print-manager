{% extends "base.html" %}

{% block title %}Error · 3D Print Manager{% endblock %}
{% block page_icon %}<i class="fa-solid fa-triangle-exclamation"></i>{% endblock %}
{% block page_title %}Something went wrong{% endblock %}

{% block content %}
<div class="card">
  <p class="empty-hint" style="color: var(--red);">
    <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
  </p>
  <div class="form-actions" style="margin-top:1.5rem">
    <a href="/" class="btn btn-primary"><i class="fa-solid fa-house"></i> Back to Dashboard</a>
  </div>
</div>
{% endblock %}
